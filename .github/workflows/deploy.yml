name: Release Deploy

on:
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: release-deploy
  cancel-in-progress: false

jobs:
  deploy-functions:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/')
    name: Deploy Firebase Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @moments/shared build

      - name: Build functions
        run: pnpm --filter @moments/functions build

      - name: Deploy to Firebase Functions
        run: npx firebase-tools@14 deploy --only functions --force --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }}

  deploy-web:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/')
    name: Deploy Web (Firebase Hosting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @moments/shared build

      - name: Expo Web Build
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID_WEB: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID_WEB }}
        run: pnpm run export

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@14 deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }}