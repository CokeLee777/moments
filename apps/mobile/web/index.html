<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1.00001,viewport-fit=cover"
    />
    <meta name="theme-color" content="#060b16" />
    <link rel="manifest" href="/manifest.json" />
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="찰나" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      #root { visibility: hidden; }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #060b16;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        transition: opacity 0.45s ease;
      }
      #splash.hiding {
        opacity: 0;
        pointer-events: none;
      }

      #splash-glow {
        position: absolute;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(99,102,241,0.35) 0%, transparent 70%);
        animation: splashGlowPulse 2.4s ease-in-out infinite;
      }

      #splash-icon {
        width: 80px;
        height: 80px;
        border-radius: 22px;
        background-image: url('/icon-192.png');
        background-size: cover;
        animation: splashIconIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both,
                   splashIconPulse 2s ease-in-out 0.6s infinite;
        opacity: 0;
      }

      #splash-name {
        font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        font-weight: 900;
        font-size: 38px;
        color: #f1f5f9;
        letter-spacing: -1px;
        opacity: 0;
        animation: splashFadeIn 0.5s ease 0.5s forwards;
      }

      #splash-divider {
        width: 32px;
        height: 1px;
        background: linear-gradient(90deg, transparent, #6366f1, transparent);
        opacity: 0;
        animation: splashFadeIn 0.4s ease 0.8s forwards;
      }

      #splash-slogan {
        font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
        font-size: 13px;
        color: rgba(255,255,255,0.45);
        letter-spacing: 0.3px;
        text-align: center;
        opacity: 0;
        animation: splashSlideUp 0.5s ease 1s forwards;
      }

      @keyframes splashIconIn {
        from { opacity: 0; transform: scale(0.7); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes splashIconPulse {
        0%, 100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(99,102,241,0.5); }
        50%       { transform: scale(1.06); box-shadow: 0 0 0 12px rgba(99,102,241,0); }
      }
      @keyframes splashFadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes splashSlideUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes splashGlowPulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50%       { opacity: 1;   transform: scale(1.1); }
      }
    </style>
    <meta name="google-adsense-account" content="ca-pub-1265951958398504" />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1265951958398504"
      crossorigin="anonymous"
    ></script>
    %EXPO_HEAD%
  </head>
  <body>
    <div id="splash">
      <div id="splash-glow"></div>
      <div id="splash-icon"></div>
      <div id="splash-name">찰나</div>
      <div id="splash-divider"></div>
      <div id="splash-slogan">오늘의 트렌드를 한눈에 만나세요</div>
    </div>
    <div id="root"></div>
    <script>
      window.hideSplash = function () {
        var root = document.getElementById('root');
        if (root) root.style.visibility = 'visible';
        var el = document.getElementById('splash');
        if (!el) return;
        el.classList.add('hiding');
        setTimeout(function () { el.remove(); }, 500);
      };
    </script>
  </body>
</html>
